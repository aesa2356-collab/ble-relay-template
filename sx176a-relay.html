<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SX176A Relay</title>

<style>

body {
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f5f5f5;
    padding:20px;
    text-align:center;
}

h2 {
    margin-bottom:20px;
}


button {

    width:45%;
    height:60px;

    margin:8px;

    border:none;
    border-radius:14px;

    background:#222;
    color:white;

    font-size:20px;

}


button:active {

    transform:scale(0.96);

}


.stop {

    width:94%;
    background:#c62828;

}


.mode.active {

    background:#1976d2;

}



input[type=range] {

    width:95%;
    height:40px;

}


.card {

    background:white;

    border-radius:18px;

    padding:18px;

    margin-bottom:20px;

}


#log {

    text-align:left;

    background:#111;

    color:#0f0;

    height:160px;

    overflow:auto;

    padding:10px;

    border-radius:10px;

    font-family:monospace;

    font-size:13px;

}


.small {

    color:#666;

    font-size:14px;

}

</style>

</head>


<body>


<h2>SX176A-02 控制</h2>


<div class="card">

<button onclick="connectBLE()">
连接设备
</button>


<p id="status">
未连接
</p>


</div>




<div class="card">


<h3>
强度：
<span id="strengthText">0</span>%
</h3>


<input
type="range"
min="0"
max="100"
value="0"
id="strength"
oninput="changeStrength(this.value)"
>


<p class="small">
低于10%自动调整为最低有效档
</p>


</div>





<div class="card">


<h3>
模式
</h3>


<button class="mode" onclick="setMode(1,this)">
模式1
</button>

<button class="mode" onclick="setMode(2,this)">
模式2
</button>


<button class="mode" onclick="setMode(3,this)">
模式3
</button>


<button class="mode" onclick="setMode(4,this)">
模式4
</button>


<button class="mode" onclick="setMode(5,this)">
模式5
</button>


<button class="mode" onclick="setMode(6,this)">
模式6
</button>


</div>




<div class="card">


<button class="stop" onclick="stopDevice()">
停止
</button>


</div>





<div class="card">


<h3>
AI Relay
</h3>


<input
id="railway"
placeholder="Railway地址"
style="width:90%;height:35px;"
>


<br><br>


<input
id="secret"
placeholder="Secret"
style="width:90%;height:35px;"
>


<br>


<button onclick="startPolling()">
启动AI
</button>


</div>




<div id="log"></div>





<script>


let device;

let writeChar;


const SERVICE_UUID =
"0000ffe0-0000-1000-8000-00805f9b34fb";


const WRITE_UUID =
"0000ffe1-0000-1000-8000-00805f9b34fb";



let currentMode = null;

let currentStrength = 0;


let keepAliveTimer = null;


let pollingTimer = null;




function log(msg){

    let box=document.getElementById("log");

    box.innerHTML += msg+"<br>";

    box.scrollTop=box.scrollHeight;

}





async function connectBLE(){


    device =
    await navigator.bluetooth.requestDevice({

        filters:[
            {
                namePrefix:"SX176A"
            }
        ],

        optionalServices:[
            SERVICE_UUID
        ]

    });



    let server =
    await device.gatt.connect();


    let service =
    await server.getPrimaryService(
        SERVICE_UUID
    );


    writeChar =
    await service.getCharacteristic(
        WRITE_UUID
    );


    document.getElementById("status")
    .innerHTML =
    "已连接: "+device.name;


    log("BLE连接成功");


}






async function send(bytes){


    if(!writeChar){

        log("未连接设备");

        return;

    }


    await writeChar
    .writeValueWithoutResponse(
        new Uint8Array(bytes)
    );


}




function intensityByte(value){


    if(value<=0){

        return 0;

    }


    // 最低有效值

    if(value<10){

        return 25;

    }


    return Math.round(
        value/100*255
    );


}






function intensityCommand(value){


    return [

        0x55,
        0x04,
        0x00,
        0x00,
        0x01,
        intensityByte(value),
        0xAA

    ];

}





function modeCommand(mode){


    return [

        0x55,
        0x03,
        0x00,
        0x00,
        mode,
        0x02,
        0x00

    ];

}







function startKeepAlive(){



    if(keepAliveTimer){

        clearInterval(
            keepAliveTimer
        );

    }



    sendCurrent();



    keepAliveTimer =
    setInterval(()=>{

        sendCurrent();

    },1500);


}






function sendCurrent(){


    if(currentMode){

        send(
            modeCommand(currentMode)
        );

    }


    if(currentStrength>0){

        send(
            intensityCommand(
                currentStrength
            )
        );

    }


}





function changeStrength(v){


    currentStrength =
    Number(v);


    document
    .getElementById("strengthText")
    .innerText=v;


    if(v==0){

        stopDevice();

        return;

    }


    startKeepAlive();


    log(
    "强度 "+v+"%"
    );


}





function setMode(mode,btn){


    currentMode=mode;


    document
    .querySelectorAll(".mode")
    .forEach(
        b=>b.classList.remove("active")
    );


    btn.classList.add("active");


    startKeepAlive();


    log(
    "模式 "+mode
    );


}





function stopDevice(){



    if(keepAliveTimer){

        clearInterval(
            keepAliveTimer
        );

        keepAliveTimer=null;

    }



    send([

        0x55,
        0x04,
        0x00,
        0x00,
        0x00,
        0x00,
        0xAA

    ]);



    currentStrength=0;


    log("停止");


}







// =================
// AI Relay
// =================




function startPolling(){


    if(pollingTimer){

        return;

    }


    pollingTimer =
    setInterval(
        pollAI,
        300
    );


    log("AI轮询启动");


}






async function pollAI(){


    let url =
    document.getElementById("railway").value;


    let secret =
    document.getElementById("secret").value;



    if(!url){

        return;

    }



    try{


        let res =
        await fetch(

            url+
            "/toy-next?secret="
            +
            encodeURIComponent(secret)

        );



        let data =
        await res.json();



        if(data.command){


            log(
            JSON.stringify(data.command)
            );


            handleAI(
                data.command
            );

        }


    }

    catch(e){

        log(
        "AI错误 "+e
        );

    }



}






function handleAI(cmd){



    if(
        cmd.action==="intensity"
    ){

        changeStrength(
            cmd.value
        );


    }



    if(
        cmd.action==="mode"
    ){

        setMode(
            cmd.mode,
            document.querySelectorAll(".mode")[cmd.mode-1]
        );


    }



    if(
        cmd.action==="stop"
    ){

        stopDevice();

    }


}



</script>


</body>
</html>
