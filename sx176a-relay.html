<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>SX176A Relay V4</title>


<style>

body{

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

background:#f5f5f5;

padding:20px;

text-align:center;

}



.card{

background:white;

border-radius:20px;

padding:20px;

margin-bottom:20px;

}



button{

width:44%;

height:60px;

margin:8px;

border:none;

border-radius:15px;

background:#222;

color:white;

font-size:20px;

}



button.active{

background:#1976d2;

}



.stop{

width:92%;

background:#c62828;

}



input[type=range]{

width:95%;

height:40px;

}



#log{

height:160px;

background:#111;

color:#0f0;

text-align:left;

overflow:auto;

padding:10px;

border-radius:10px;

font-family:monospace;

font-size:13px;

}


</style>

</head>



<body>


<h2>SX176A-02 Relay</h2>



<div class="card">


<button onclick="connectBLE()">

连接设备

</button>


<p id="status">

未连接

</p>


</div>





<div class="card">


<h3>

强度：

<span id="percentText">

0

</span>%

</h3>



<input

type="range"

min="0"

max="100"

value="0"

oninput="changeStrength(this.value)"

>



<p>

设备等级：

<span id="levelText">

0

</span>/10

</p>


<p>

当前模式：

<span id="modeText">

无

</span>

</p>


</div>





<div class="card">


<h3>模式</h3>


<button class="mode"

onclick="setMode(1,this)">

模式1

</button>


<button class="mode"

onclick="setMode(2,this)">

模式2

</button>


<button class="mode"

onclick="setMode(3,this)">

模式3

</button>


<button class="mode"

onclick="setMode(4,this)">

模式4

</button>


<button class="mode"

onclick="setMode(5,this)">

模式5

</button>


<button class="mode"

onclick="setMode(6,this)">

模式6

</button>


</div>





<div class="card">


<button class="stop"

onclick="stopDevice()">

停止

</button>


</div>





<div class="card">


<h3>

AI Relay

</h3>


<input id="railway"

placeholder="Railway地址"

style="width:90%;height:35px;"

>


<br><br>


<input id="secret"

placeholder="Secret"

style="width:90%;height:35px;"

>


<br>


<button onclick="startPolling()">

启动AI

</button>


</div>





<div id="log"></div>




<script>


let device;

let writeChar;



const SERVICE_UUID =

"0000ffe0-0000-1000-8000-00805f9b34fb";



const WRITE_UUID =

"0000ffe1-0000-1000-8000-00805f9b34fb";



let currentMode = 1;

let currentLevel = 0;

let keepAliveTimer=null;

let pollingTimer=null;






function log(msg){

let box=document.getElementById("log");

box.innerHTML += msg+"<br>";

box.scrollTop=box.scrollHeight;

}






async function connectBLE(){


device=

await navigator.bluetooth.requestDevice({

filters:[

{

namePrefix:"SX176A"

}

],


optionalServices:[

SERVICE_UUID

]


});



let server=

await device.gatt.connect();



let service=

await server.getPrimaryService(

SERVICE_UUID

);



writeChar=

await service.getCharacteristic(

WRITE_UUID

);



document.getElementById("status").innerText=

"已连接 "+device.name;



log("BLE连接成功");


}








async function send(bytes){


if(!writeChar){

log("未连接");

return;

}


await writeChar.writeValueWithoutResponse(

new Uint8Array(bytes)

);


}







function percentToLevel(percent){


percent=Number(percent);



if(percent<=0){

return 0;

}



return Math.ceil(percent/10);


}






function makeCommand(){


return [

0x55,

0x03,

0x00,

0x00,

currentMode,

currentLevel,

0x00

];


}






function sendCurrent(){


if(currentLevel>0){

send(makeCommand());

}


}







function startKeepAlive(){



if(keepAliveTimer){

clearInterval(keepAliveTimer);

}



sendCurrent();



keepAliveTimer=

setInterval(()=>{


sendCurrent();


},1500);



}








function changeStrength(value){


currentLevel=

percentToLevel(value);



document.getElementById("percentText")

.innerText=value;



document.getElementById("levelText")

.innerText=currentLevel;



if(currentLevel===0){

stopDevice();

return;

}



startKeepAlive();



log(

"强度 "+value+"% 等级 "+currentLevel

);


}







function setMode(mode,btn){


currentMode=mode;



document.querySelectorAll(".mode")

.forEach(b=>{

b.classList.remove("active");

});



btn.classList.add("active");



document.getElementById("modeText")

.innerText=mode;



if(currentLevel>0){

startKeepAlive();

}



log(

"模式 "+mode

);


}








function stopDevice(){


if(keepAliveTimer){

clearInterval(keepAliveTimer);

keepAliveTimer=null;

}



send([

0x55,

0x04,

0x00,

0x00,

0x00,

0x00,

0xAA

]);



currentLevel=0;



document.getElementById("levelText")

.innerText=0;



log("停止");


}






// ====================
// AI Relay
// ====================


function startPolling(){


if(pollingTimer){

return;

}



pollingTimer=

setInterval(

pollAI,

300

);



log("AI轮询启动");


}







async function pollAI(){


let url=

document.getElementById("railway").value;



let secret=

document.getElementById("secret").value;



if(!url){

return;

}



try{


let res=

await fetch(

url+

"/toy-next?secret="+

encodeURIComponent(secret)

);



let data=

await res.json();



if(data.command){

log(JSON.stringify(data.command));

handleAI(data.command);


}


}

catch(e){

log("AI错误 "+e);

}


}






function handleAI(cmd){


if(cmd.action==="mode"){

setMode(

cmd.mode,

document.querySelectorAll(".mode")[cmd.mode-1]

);


}



if(cmd.action==="intensity"){


changeStrength(cmd.value);


}



if(cmd.action==="set"){


currentMode=cmd.mode;


currentLevel=

percentToLevel(cmd.intensity);


startKeepAlive();


}



if(cmd.action==="stop"){


stopDevice();


}


}




</script>


</body>

</html>
