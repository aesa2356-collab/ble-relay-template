<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SX176A Relay V4</title>

<style>

body{
    font-family:Arial,sans-serif;
    padding:20px;
    background:#fafafa;
}

h1{
    font-size:28px;
}

button{

    width:100%;
    height:65px;
    margin:8px 0;

    font-size:22px;
    border-radius:12px;
    border:0;

    background:#222;
    color:white;
}

button.mode{

    width:31%;
    height:60px;
    font-size:18px;

}

#status{

    padding:15px;
    background:white;
    border-radius:10px;
    margin:15px 0;

}


input[type=range]{

    width:100%;
    height:40px;

}


#log{

    background:#111;
    color:#0f0;

    height:220px;
    overflow:auto;

    padding:10px;

    border-radius:10px;

    font-family:monospace;
}


.modeBox{

    display:flex;
    gap:5px;
    flex-wrap:wrap;

}


</style>

</head>


<body>


<h1>SX176A BLE Relay V4</h1>


<button onclick="connectBLE()">
连接设备
</button>


<div id="status">
未连接
</div>



<h2>
模式
</h2>


<div class="modeBox">

<button class="mode" onclick="setMode(1)">
模式1
</button>

<button class="mode" onclick="setMode(2)">
模式2
</button>

<button class="mode" onclick="setMode(3)">
模式3
</button>

<button class="mode" onclick="setMode(4)">
模式4
</button>

<button class="mode" onclick="setMode(5)">
模式5
</button>

<button class="mode" onclick="setMode(6)">
模式6
</button>

</div>



<h2>
强度：
<span id="value">
0
</span>%
</h2>


<input
type="range"
min="0"
max="100"
value="0"
id="slider"
oninput="changeIntensity(this.value)"
>



<button onclick="stopDevice()">
停止
</button>



<h2>
日志
</h2>

<div id="log"></div>

<h2>AI Relay</h2>

<input id="railway" type="text" placeholder="Railway URL">

<input id="secret" type="password" placeholder="Secret">

<button onclick="startPolling()">Start AI Relay</button>


<script>

let device;
let characteristic;

let currentMode = 1;
let currentIntensity = 0;

let keepAliveTimer = null;


// =======================
// UUID
// =======================

const SERVICE_UUID = "FFE0";
const WRITE_UUID = "FFE1";


// =======================
// 日志
// =======================

function log(msg){

    let box=document.getElementById("log");

    box.innerHTML +=
        new Date().toLocaleTimeString()
        +"  "
        +msg
        +"<br>";

    box.scrollTop=box.scrollHeight;

}


// =======================
// 连接 BLE
// =======================

async function connectBLE(){

try{

    log("开始扫描...");


    device = await navigator.bluetooth.requestDevice({

        filters:[
            {
                namePrefix:"SX176A"
            }
        ],

        optionalServices:[
            SERVICE_UUID
        ]

    });



    let server =
        await device.gatt.connect();


    let service =
        await server.getPrimaryService(
            SERVICE_UUID
        );


    characteristic =
        await service.getCharacteristic(
            WRITE_UUID
        );


    document.getElementById("status").innerHTML =
        "已连接: "
        +device.name;


    log(
        "BLE连接成功"
    );


}
catch(e){

    log(
        "连接失败: "
        +e
    );

}


}



// =======================
// HEX发送
// =======================

async function sendHex(hex){


    if(!characteristic){

        log(
            "未连接设备"
        );

        return;

    }


    let bytes =
        hex.match(/.{1,2}/g)
        .map(
            x=>parseInt(x,16)
        );


    await characteristic.writeValueWithoutResponse(
        new Uint8Array(bytes)
    );


    log(
        "发送: "
        +hex
    );


}



// =======================
// 模式
// =======================


function setMode(mode){


    currentMode = mode;


    let hex =
        "550300000"
        + mode
        + "0200";


    sendHex(hex);


    log(
        "模式 "
        +mode
    );


}




// =======================
// 强度
// =======================


// 百分比转换设备值
function percentToHex(value){


    let num =
        Math.round(
            Number(value) / 100 * 255
        );


    return num
        .toString(16)
        .padStart(2,"0")
        .toUpperCase();


}



function changeIntensity(value){


    currentIntensity =
        Number(value);


    document.getElementById("value")
        .innerHTML=value;



    sendIntensity(
        currentIntensity
    );


}




function sendIntensity(value){


    let hexValue =
        percentToHex(value);



    let cmd =
        "5504000001"
        +
        hexValue
        +
        "AA";



    sendHex(cmd);



    startKeepAlive();

}



// =======================
// 保活
// =======================


function startKeepAlive(){


    if(keepAliveTimer)
        clearInterval(
            keepAliveTimer
        );



    keepAliveTimer =
        setInterval(()=>{


            if(currentIntensity>0){

                sendIntensityOnce(
                    currentIntensity
                );

            }


        },1500);



}



function sendIntensityOnce(value){


    let hexValue =
        percentToHex(value);


    sendHex(
        "5504000001"
        +
        hexValue
        +
        "AA"
    );


}



// =======================
// 停止
// =======================


function stopDevice(){


    if(keepAliveTimer){

        clearInterval(
            keepAliveTimer
        );

        keepAliveTimer=null;

    }


    currentIntensity=0;


    document.getElementById("slider")
        .value=0;


    document.getElementById("value")
        .innerHTML="0";



    sendHex(
        "550400000000AA"
    );


    log(
        "停止"
    );


}



// =======================
// MCP轮询
// =======================


let pollingTimer = null;


function startPolling(){

    if(pollingTimer)
        clearInterval(pollingTimer);

    pollCommand();

    pollingTimer = setInterval(
        pollCommand,
        300
    );

    log("AI Relay polling started");

}


async function pollCommand(){


try{


    let url =
        document.getElementById("railway").value;

    let secret =
        document.getElementById("secret").value;

    let cleanUrl =
        url.trim().replace(/\/$/, "");

    if(!cleanUrl)
        return;


    let res =
        await fetch(

            cleanUrl
            +
            "/toy-next?secret="
            +
            encodeURIComponent(secret.trim())
            +
            "&t="
            +
            Date.now(),

            {
                cache: "no-store"
            }

        );



    if(!res.ok){

        log("轮询HTTP错误: " + res.status);

        return;

    }

    let text = await res.text();



    if(!text)
        return;



    let cmd =
        JSON.parse(text);



    if(!cmd.command)
        return;



    handleCommand(
        cmd.command
    );


}
catch(e){


    log(
        "轮询错误:"
        +
        e
    );


}



}




// Polling starts only after the AI Relay button is pressed.



// =======================
// AI命令处理
// =======================


function handleCommand(cmd){


    log(
        "收到AI:"
        + JSON.stringify(cmd)
    );



    if(cmd.action==="set"){


        if(cmd.mode!==undefined){

            setMode(
                cmd.mode
            );

        }



        if(cmd.intensity!==undefined){


            setTimeout(()=>{


                changeIntensity(
                    cmd.intensity
                );


            },300);


        }


    }




    if(cmd.action==="stop"){


        stopDevice();


    }




    //兼容旧格式

    if(cmd.action==="intensity"){


        changeIntensity(
            cmd.value
        );


    }


}



</script>

</body>

</html>

body{

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

background:#1976d2;

width:92%;

width:95%;

height:160px;

background:#111;

<body>


<h2>SX176A-02 Relay</h2>



<div class="card">


<button onclick="connectBLE()">

连接设备

</button>


<p id="status">

未连接

</p>


</div>





<div class="card">


<h3>

强度：

<span id="percentText">

0

</span>%

</h3>



<input

type="range"

min="0"

max="100"

value="0"

oninput="changeStrength(this.value)"

>



<p>

设备等级：

<span id="levelText">

0

</span>/10

</p>


<p>

当前模式：

<span id="modeText">

无

</span>

</p>


</div>





<div class="card">


<h3>模式</h3>


<button class="mode"

onclick="setMode(1,this)">

模式1

</button>


<button class="mode"

onclick="setMode(2,this)">

模式2

</button>


<button class="mode"

onclick="setMode(3,this)">

模式3

</button>


<button class="mode"

onclick="setMode(4,this)">

模式4

</button>


<button class="mode"

onclick="setMode(5,this)">

模式5

</button>


<button class="mode"

onclick="setMode(6,this)">

模式6

</button>


</div>





<div class="card">


<button class="stop"

onclick="stopDevice()">

停止

</button>


</div>





<div class="card">


<h3>

AI Relay

</h3>


<input id="railway"

placeholder="Railway地址"

style="width:90%;height:35px;"

>


<br><br>


<input id="secret"

placeholder="Secret"

style="width:90%;height:35px;"

>


<br>


<button onclick="startPolling()">

启动AI

</button>


</div>





<div id="log"></div>




<script>


let device;

let writeChar;



const SERVICE_UUID =

"0000ffe0-0000-1000-8000-00805f9b34fb";



const WRITE_UUID =

"0000ffe1-0000-1000-8000-00805f9b34fb";



let currentMode = 1;

let currentLevel = 0;

let keepAliveTimer=null;

let pollingTimer=null;






function log(msg){

let box=document.getElementById("log");

box.innerHTML += msg+"<br>";

box.scrollTop=box.scrollHeight;

}






async function connectBLE(){


device=

await navigator.bluetooth.requestDevice({

filters:[

{

namePrefix:"SX176A"

}

],


optionalServices:[

SERVICE_UUID

]


});



let server=

await device.gatt.connect();



let service=

await server.getPrimaryService(

SERVICE_UUID

);



writeChar=

await service.getCharacteristic(

WRITE_UUID

);



document.getElementById("status").innerText=

"已连接 "+device.name;



log("BLE连接成功");


}








async function send(bytes){


if(!writeChar){

log("未连接");

return;

}


await writeChar.writeValueWithoutResponse(

new Uint8Array(bytes)

);


}







function percentToLevel(percent){


percent=Number(percent);



if(percent<=0){

return 0;

}



return Math.ceil(percent/10);


}






function makeCommand(){


return [

0x55,

0x03,

0x00,

0x00,

currentMode,

currentLevel,

0x00

];


}






function sendCurrent(){


if(currentLevel>0){

send(makeCommand());

}


}







function startKeepAlive(){



if(keepAliveTimer){

clearInterval(keepAliveTimer);

}



sendCurrent();



keepAliveTimer=

setInterval(()=>{


sendCurrent();


},1500);



}








function changeStrength(value){


currentLevel=

percentToLevel(value);



document.getElementById("percentText")

.innerText=value;



document.getElementById("levelText")

.innerText=currentLevel;



if(currentLevel===0){

stopDevice();

return;

}



startKeepAlive();



log(

"强度 "+value+"% 等级 "+currentLevel

);


}







function setMode(mode,btn){


currentMode=mode;



document.querySelectorAll(".mode")

.forEach(b=>{

b.classList.remove("active");

});



btn.classList.add("active");



document.getElementById("modeText")

.innerText=mode;



if(currentLevel>0){

startKeepAlive();

}



log(

"模式 "+mode

);


}








function stopDevice(){


if(keepAliveTimer){

clearInterval(keepAliveTimer);

keepAliveTimer=null;

}



send([

0x55,

0x04,

0x00,

0x00,

0x00,

0x00,

0xAA

]);



currentLevel=0;



document.getElementById("levelText")

.innerText=0;



log("停止");


}






// ====================
// AI Relay
// ====================


function startPolling(){


if(pollingTimer){

return;

}



pollingTimer=

setInterval(

pollAI,

300

);



log("AI轮询启动");


}







async function pollAI(){


let url=

document.getElementById("railway").value;



let secret=

document.getElementById("secret").value;



if(!url){

return;

}



try{


let res=

await fetch(

url+

"/toy-next?secret="+

encodeURIComponent(secret)

);



let data=

await res.json();



if(data.command){

log(JSON.stringify(data.command));

handleAI(data.command);


}


}

catch(e){

log("AI错误 "+e);

}


}






function handleAI(cmd){


if(cmd.action==="mode"){

setMode(

cmd.mode,

document.querySelectorAll(".mode")[cmd.mode-1]

);


}



if(cmd.action==="intensity"){


changeStrength(cmd.value);


}



if(cmd.action==="set"){


currentMode=cmd.mode;


currentLevel=

percentToLevel(cmd.intensity);


startKeepAlive();


}



if(cmd.action==="stop"){


stopDevice();


}


}




</script>


</body>

</html>
