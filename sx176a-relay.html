<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SX176A Relay V4</title>

<style>

body{
    font-family:Arial,sans-serif;
    padding:20px;
    background:#fafafa;
}

h1{
    font-size:28px;
}

button{

    width:100%;
    height:65px;
    margin:8px 0;

    font-size:22px;
    border-radius:12px;
    border:0;

    background:#222;
    color:white;
}

button.mode{

    width:31%;
    height:60px;
    font-size:18px;

}

#status{

    padding:15px;
    background:white;
    border-radius:10px;
    margin:15px 0;

}


input[type=range]{

    width:100%;
    height:40px;

}


#log{

    background:#111;
    color:#0f0;

    height:220px;
    overflow:auto;

    padding:10px;

    border-radius:10px;

    font-family:monospace;
}


.modeBox{

    display:flex;
    gap:5px;
    flex-wrap:wrap;

}


</style>

</head>


<body>


<h1>SX176A BLE Relay V4</h1>


<button onclick="connectBLE()">
连接设备
</button>


<div id="status">
未连接
</div>



<h2>
模式
</h2>


<div class="modeBox">

<button class="mode" onclick="setMode(1)">
模式1
</button>

<button class="mode" onclick="setMode(2)">
模式2
</button>

<button class="mode" onclick="setMode(3)">
模式3
</button>

<button class="mode" onclick="setMode(4)">
模式4
</button>

<button class="mode" onclick="setMode(5)">
模式5
</button>

<button class="mode" onclick="setMode(6)">
模式6
</button>

</div>



<h2>
强度：
<span id="value">
0
</span>%
</h2>


<input
type="range"
min="0"
max="100"
value="0"
id="slider"
oninput="changeIntensity(this.value)"
>



<button onclick="stopDevice()">
停止
</button>



<h2>
日志
</h2>

<div id="log"></div>

<h2>AI Relay</h2>

<input id="railway" type="text" placeholder="Railway URL">

<input id="secret" type="password" placeholder="Secret">

<button onclick="startPolling()">Start AI Relay</button>


<script>

let device;
let characteristic;

let currentMode = 1;
let currentLevel = 0;
let currentPercent = 0;

let keepAliveTimer = null;


// =======================
// UUID
// =======================

const SERVICE_UUID = "FFE0";
const WRITE_UUID = "FFE1";


// =======================
// 日志
// =======================

function log(msg){

    let box=document.getElementById("log");

    box.innerHTML +=
        new Date().toLocaleTimeString()
        +"  "
        +msg
        +"<br>";

    box.scrollTop=box.scrollHeight;

}


// =======================
// 连接 BLE
// =======================

async function connectBLE(){

try{

    log("开始扫描...");


    device = await navigator.bluetooth.requestDevice({

        filters:[
            {
                namePrefix:"SX176A"
            }
        ],

        optionalServices:[
            SERVICE_UUID
        ]

    });



    let server =
        await device.gatt.connect();


    let service =
        await server.getPrimaryService(
            SERVICE_UUID
        );


    characteristic =
        await service.getCharacteristic(
            WRITE_UUID
        );


    document.getElementById("status").innerHTML =
        "已连接: "
        +device.name;


    log(
        "BLE连接成功"
    );


}
catch(e){

    log(
        "连接失败: "
        +e
    );

}


}



// =======================
// HEX发送
// =======================

async function send(bytes){


    if(!characteristic){

        log(
            "未连接设备"
        );

        return;

    }


    await characteristic.writeValueWithoutResponse(
        new Uint8Array(bytes)
    );


    log(
        "发送: "
        + Array.from(bytes)
            .map(value=>value.toString(16).padStart(2,"0"))
            .join("")
            .toUpperCase()
    );


}



// =======================
// 模式
// =======================


function setMode(mode){


    currentMode = mode;


    if(currentLevel>0){

        startKeepAlive();

    }


    log(
        "模式 "
        +mode
    );


}




// =======================
// 强度
// =======================


// 百分比转换设备档位
function levelFromPercent(percent){

    percent = Number(percent);

    if(percent<=0) return 0;
    if(percent<=20) return 1;
    if(percent<=40) return 2;
    if(percent<=60) return 3;
    if(percent<=80) return 4;

    return 5;

}



function changeIntensity(value){


    currentPercent =
        Number(value);


    currentLevel =
        levelFromPercent(currentPercent);


    document.getElementById("value")
        .innerHTML=value;



    if(currentLevel===0){

        stopDevice();
        return;

    }


    startKeepAlive();


}




// =======================
// 保活
// =======================


function makeModeCommand(){

    return [
        0x55,
        0x03,
        0x00,
        0x00,
        currentMode,
        currentLevel,
        0x00
    ];

}


function sendCurrent(){

    if(currentLevel>0){

        send(
            makeModeCommand()
        );

    }

}


function startKeepAlive(){

    if(keepAliveTimer)
        clearInterval(
            keepAliveTimer
        );


    sendCurrent();


    keepAliveTimer =
        setInterval(()=>{

            sendCurrent();

        },1500);

}



// =======================
// 停止
// =======================


function stopDevice(){


    if(keepAliveTimer){

        clearInterval(
            keepAliveTimer
        );

        keepAliveTimer=null;

    }


    currentLevel=0;
    currentPercent=0;


    document.getElementById("slider")
        .value=0;


    document.getElementById("value")
        .innerHTML="0";



    send([
        0x55,
        0x04,
        0x00,
        0x00,
        0x00,
        0x00,
        0xAA
    ]);


    log(
        "停止"
    );


}



// =======================
// MCP轮询
// =======================


let pollingTimer = null;


function startPolling(){

    if(pollingTimer)
        clearInterval(pollingTimer);

    pollCommand();

    pollingTimer = setInterval(
        pollCommand,
        300
    );

    log("AI Relay polling started");

}


async function pollCommand(){


try{


    let url =
        document.getElementById("railway").value;

    let secret =
        document.getElementById("secret").value;

    let cleanUrl =
        url.trim().replace(/\/$/, "");

    if(!cleanUrl)
        return;


    let res =
        await fetch(

            cleanUrl
            +
            "/toy-next?secret="
            +
            encodeURIComponent(secret.trim())
            +
            "&t="
            +
            Date.now(),

            {
                cache: "no-store"
            }

        );



    if(!res.ok){

        log("轮询HTTP错误: " + res.status);

        return;

    }

    let text = await res.text();



    if(!text)
        return;



    let cmd =
        JSON.parse(text);



    if(!cmd.command)
        return;



    handleCommand(
        cmd.command
    );


}
catch(e){


    log(
        "轮询错误:"
        +
        e
    );


}



}




// Polling starts only after the AI Relay button is pressed.



// =======================
// AI命令处理
// =======================


function handleCommand(cmd){


    log(
        "收到AI:"
        + JSON.stringify(cmd)
    );



    if(cmd.action==="set"){


        if(cmd.mode!==undefined){

            currentMode = cmd.mode;

        }



        if(cmd.intensity!==undefined){

            currentPercent = Number(cmd.intensity);
            currentLevel = levelFromPercent(currentPercent);

            document.getElementById("slider")
                .value=currentPercent;

            document.getElementById("value")
                .innerHTML=currentPercent;


        }


        if(currentLevel===0){

            if(cmd.intensity!==undefined)
                stopDevice();

        }
        else{

            startKeepAlive();

        }


    }




    if(cmd.action==="stop"){


        stopDevice();


    }




    //兼容旧格式

    if(cmd.action==="intensity"){


        changeIntensity(
            cmd.value
        );


    }


}



</script>

</body>

</html>
