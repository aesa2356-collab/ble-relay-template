<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>SX176A Relay</title>


<style>

body{
font-family:sans-serif;
padding:20px;
}

button{
font-size:20px;
padding:14px 25px;
margin:8px;
}

input{
width:95%;
font-size:18px;
padding:8px;
}

#log{

margin-top:20px;
height:250px;
overflow:auto;
background:#111;
color:#0f0;
padding:10px;
font-family:monospace;

}

.mode{

width:70px;

}

</style>


</head>


<body>


<h2>SX176A BLE Relay</h2>


<button onclick="connectBLE()">
连接设备
</button>


<p id="status">
未连接
</p>


<hr>


<h3>模式</h3>


<button class="mode"
onclick="setMode(1)">
模式1
</button>

<button class="mode"
onclick="setMode(2)">
模式2
</button>

<button class="mode"
onclick="setMode(3)">
模式3
</button>

<button class="mode"
onclick="setMode(4)">
模式4
</button>

<button class="mode"
onclick="setMode(5)">
模式5
</button>

<button class="mode"
onclick="setMode(6)">
模式6
</button>


<h3>强度</h3>


<input
type="range"
min="0"
max="100"
value="0"
id="speed"
oninput="manualSpeed(this.value)"
>


<p>
强度：
<span id="value">
0
</span>%
</p>


<button onclick="stopDevice()">
停止
</button>



<hr>


<h3>AI Relay</h3>


<input
id="railway"
placeholder="Railway URL">


<br>


<input
id="secret"
placeholder="Secret">


<br>


<button onclick="startPolling()">
启动AI控制
</button>



<div id="log"></div>



<script>


let device=null;

let writeChar=null;


let keepAlive=null;


let polling=null;


let currentMode=1;



const SERVICE=
"0000ffe0-0000-1000-8000-00805f9b34fb";


const WRITE=
"0000ffe1-0000-1000-8000-00805f9b34fb";





function log(t){

let box=document.getElementById("log");

box.innerHTML+=t+"<br>";

box.scrollTop=box.scrollHeight;

}





async function connectBLE(){


device=
await navigator.bluetooth.requestDevice({

filters:[
{
namePrefix:"SX176A"
}
],

optionalServices:[
SERVICE
]

});


let server=
await device.gatt.connect();


let service=
await server.getPrimaryService(
SERVICE
);


writeChar=
await service.getCharacteristic(
WRITE
);


document.getElementById("status")
.innerText=
"已连接 "+device.name;


log("BLE连接成功");


}





async function sendCommand(bytes){


if(!writeChar){

log("未连接BLE");

return;

}


await writeChar
.writeValueWithoutResponse(
new Uint8Array(bytes)
);


}





// 模式命令
// 当前确认有效:
// 55 03 00 00 XX 01 00

function modeCommand(mode){

return [

0x55,
0x03,
0x00,
0x00,
mode,
0x01,
0x00

];


}




// 强度命令
// 55 04 00 00 01 XX AA

function speedCommand(v){


let value=
Math.round(
v/100*255
);


return [

0x55,
0x04,
0x00,
0x00,
0x01,
value,
0xAA

];


}





function setMode(m){

currentMode=m;

sendCommand(
modeCommand(m)
);


log(
"切换模式 "+m
);


}





function manualSpeed(v){


document
.getElementById("value")
.innerText=v;


startKeepAlive(v);


}





function startKeepAlive(v){


if(keepAlive){

clearInterval(
keepAlive
);

}



let cmd=
speedCommand(v);


sendCommand(cmd);



keepAlive=
setInterval(()=>{


sendCommand(cmd);


},1500);



log(
"强度 "+v+"%"
);


}





function stopDevice(){


if(keepAlive){

clearInterval(
keepAlive
);

keepAlive=null;

}



sendCommand([

0x55,
0x04,
0x00,
0x00,
0x00,
0x00,
0xAA

]);


log("停止");


}







// =================
// AI Relay
// =================



function startPolling(){


if(polling)
return;


polling=
setInterval(
pollCommand,
300
);


log(
"AI轮询启动"
);


}






async function pollCommand(){


let url=
document
.getElementById("railway")
.value
.trim()
.replace(/\/$/,"");


let secret=
document
.getElementById("secret")
.value
.trim();



if(!url)
return;



try{


let res=
await fetch(

url+
"/toy-next?secret="
+
encodeURIComponent(secret)
+
"&t="
+
Date.now(),

{

cache:"no-store"

}

);



if(!res.ok){

log(
"HTTP错误 "+
res.status
);

return;

}



let text=
await res.text();



if(!text)
return;



let data=
JSON.parse(text);



if(data.command){


log(
"收到:"
+
JSON.stringify(data.command)
);


handleCommand(
data.command
);


}



}

catch(e){

log(
"AI错误:"
+
e
);


}


}








function handleCommand(cmd){



if(cmd.action==="set"){


setMode(
cmd.mode
);



startKeepAlive(
cmd.intensity
);


}





if(cmd.action==="intensity"){


startKeepAlive(
cmd.value
);


}




if(cmd.action==="stop"){


stopDevice();


}



}



</script>


</body>

</html>
