<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SX176A Test</title>
</head>

<body>

<h2>SX176A BLE Test</h2>

<button onclick="connectBLE()">连接设备</button>

<br><br>

<button onclick="setSpeed(30)">30%</button>
<button onclick="setSpeed(50)">50%</button>
<button onclick="stop()">停止</button>

<p id="status">未连接</p>


<script>

let device;
let characteristic;


const SERVICE_UUID =
"0000ffe0-0000-1000-8000-00805f9b34fb";

const WRITE_UUID =
"0000ffe1-0000-1000-8000-00805f9b34fb";


async function connectBLE(){

    device = await navigator.bluetooth.requestDevice({
        filters:[
            {namePrefix:"SX176A"}
        ],
        optionalServices:[
            SERVICE_UUID
        ]
    });


    const server =
        await device.gatt.connect();


    const service =
        await server.getPrimaryService(
            SERVICE_UUID
        );


    characteristic =
        await service.getCharacteristic(
            WRITE_UUID
        );


    document.getElementById("status").innerText =
    "已连接: " + device.name;

}



async function send(data){

    if(!characteristic){
        alert("请先连接");
        return;
    }

    await characteristic.writeValueWithoutResponse(
        new Uint8Array(data)
    );

}



function setSpeed(percent){

    // 0-100 转 0-255

    let value =
    Math.round(percent / 100 * 255);


    send([
        0x55,
        0x04,
        0x00,
        0x00,
        0x01,
        value,
        0xAA
    ]);
}



function stop(){

    send([
        0x55,
        0x04,
        0x00,
        0x00,
        0x00,
        0x00,
        0xAA
    ]);

}

</script>

</body>
</html>
